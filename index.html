<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo-Fi Focus Space</title>
    <style>
        /* --- THE CORE VIBE --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url('https://images.unsplash.com/photo-1501339817388-d5937807ac02?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        .rain-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/Il9f7ZhytEiI0/giphy.gif') center/cover;
            opacity: 0.3;
            pointer-events: none;
            display: none;
            z-index: 1;
        }

        /* --- HEADER & CONTROLS --- */
        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-controls input[type="text"], .preset-dropdown {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            backdrop-filter: blur(10px);
            outline: none;
        }
        
        .preset-dropdown option { background: #333; color: #fff; }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); cursor: pointer; padding: 2px;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

        .btn-style {
            padding: 10px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            backdrop-filter: blur(10px);
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            border: none;
        }
        .btn-style:hover { background: rgba(255, 255, 255, 0.4); }

        /* --- DASHBOARD WIDGETS --- */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            margin-top: 20px;
            z-index: 2;
        }

        .widget {
            background: rgba(25, 25, 25, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h2 { margin-bottom: 15px; font-weight: 600; }

        .widget button {
            background: rgba(255, 255, 255, 0.2); border: none; padding: 10px 15px;
            color: white; border-radius: 10px; cursor: pointer; transition: 0.3s; margin: 5px;
        }
        .widget button:hover { background: rgba(255, 255, 255, 0.4); }
        
        .widget input[type="text"], .widget input[type="number"] {
            padding: 10px; border-radius: 10px; border: none; outline: none;
            background: rgba(255, 255, 255, 0.8); color: #333;
        }

        /* Pomodoro Timer */
        #time-display { font-size: 3rem; font-weight: bold; margin: 10px 0; letter-spacing: 2px; }
        .timer-settings { display: flex; justify-content: center; gap: 10px; align-items: center; margin-bottom: 15px; }
        .timer-settings input { width: 60px; padding: 5px; text-align: center; }

        /* To-Do Tweaks */
        ul { list-style: none; margin-top: 15px; text-align: left; max-height: 180px; overflow-y: auto; }
        li {
            background: rgba(255, 255, 255, 0.1); padding: 10px; margin-bottom: 8px;
            border-radius: 8px; display: flex; align-items: center; gap: 10px; transition: opacity 0.3s ease;
        }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

        /* Spotify Compact Iframe */
        .spotify-frame {
            width: 100%;
            height: 152px; /* This specific height forces the compact UI from your screenshot */
            border-radius: 12px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="rain-overlay" id="rain"></div>

    <header>
        <h1>🎧 Focus Space</h1>
        <div class="header-controls">
            <button class="btn-style" onclick="toggleFullScreen()">🔲 Zen Mode</button>

            <input type="text" id="vibe-input" placeholder="Type 'rain' or 'clear'..." style="width: 150px;">
            
            <select id="preset-bg" class="preset-dropdown">
                <option value="none">✨ Choose a Vibe...</option>
                <option value="https://images.unsplash.com/photo-1501339817388-d5937807ac02?q=80&w=2070&auto=format&fit=crop">☕ Cozy Cafe</option>
                <option value="https://images.unsplash.com/photo-1555861496-faa3eafcb220?q=80&w=2073&auto=format&fit=crop">🌆 Cyberpunk City</option>
                <option value="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=2070&auto=format&fit=crop">🌅 Sunset Chill</option>
                <option value="https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?q=80&w=1974&auto=format&fit=crop">🌧️ Rainy Window</option>
            </select>

            <input type="color" id="bg-color" title="Change Background Color">
            
            <label for="bg-upload" class="btn-style">🖼️ Upload</label>
            <input type="file" id="bg-upload" accept="image/*" style="display: none;">
        </div>
    </header>

    <div class="dashboard">
        
        <div class="widget">
            <h2>⏱️ Pomodoro</h2>
            <div class="timer-settings">
                <label>Focus: <input type="number" id="focus-mins" value="25" min="1"></label>
                <label>Break: <input type="number" id="break-mins" value="5" min="1"></label>
            </div>
            <div id="time-display">25:00</div>
            <button onclick="startTimer(true)">Focus</button>
            <button onclick="startTimer(false)">Break</button>
            <button onclick="pauseTimer()">Pause</button>
        </div>

        <div class="widget">
            <h2>📝 Tasks</h2>
            <input type="text" id="task-input" placeholder="What needs doing?" style="width: 70%;">
            <button onclick="addTask()">Add</button>
            <ul id="task-list"></ul>
        </div>

        <div class="widget">
            <h2>🎵 Music Player</h2>
            <p style="font-size: 0.8rem; margin-bottom: 10px;">Paste a Spotify Link (Track or Playlist):</p>
            <input type="text" id="spotify-input" placeholder="https://open.spotify.com/..." style="width: 70%;">
            <button onclick="loadSpotify()">Load</button>
            <iframe id="spotify-frame" class="spotify-frame" src="" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
        </div>

    </div>

    <script>
        // --- 1. ZEN MODE (FULL SCREEN) ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((err) => {
                    alert(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // --- 2. BACKGROUND LOGIC ---
        const body = document.body;
        const rainOverlay = document.getElementById('rain');
        
        document.getElementById('vibe-input').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if (val.includes('rain')) { rainOverlay.style.display = 'block'; } 
            else if (val.includes('clear')) { rainOverlay.style.display = 'none'; }
        });

        document.getElementById('preset-bg').addEventListener('change', (e) => {
            if (e.target.value !== "none") {
                body.style.background = `url('${e.target.value}') no-repeat center center fixed`;
                body.style.backgroundSize = 'cover';
            }
        });

        document.getElementById('bg-color').addEventListener('input', (e) => {
            body.style.background = e.target.value; 
            rainOverlay.style.display = 'none'; 
        });

        document.getElementById('bg-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    body.style.background = `url('${event.target.result}') no-repeat center center fixed`;
                    body.style.backgroundSize = 'cover';
                };
                reader.readAsDataURL(file); 
            }
        });

        // --- 3. POMODORO LOGIC ---
        let timeLeft;
        let timerId = null;
        const timeDisplay = document.getElementById('time-display');
        const focusInput = document.getElementById('focus-mins');
        const breakInput = document.getElementById('break-mins');

        updateDisplay(focusInput.value * 60);

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            timeDisplay.textContent = `${mins}:${secs}`;
        }

        function startTimer(isFocus) {
            if (timerId !== null) clearInterval(timerId); 
            let minutes = isFocus ? focusInput.value : breakInput.value;
            timeLeft = parseInt(minutes) * 60;
            updateDisplay(timeLeft);

            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(timerId); timerId = null;
                    alert(isFocus ? "Focus time is up! Take a break." : "Break is over! Back to work.");
                }
            }, 1000);
        }

        function pauseTimer() { clearInterval(timerId); timerId = null; }

        // --- 4. TO-DO LIST LOGIC ---
        function addTask() {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            if (text === "") return;

            const li = document.createElement('li');
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.onchange = function() {
                if(this.checked) {
                    li.style.opacity = '0';
                    setTimeout(() => li.remove(), 300); 
                }
            };
            const taskText = document.createElement('span');
            taskText.textContent = text;
            li.appendChild(checkbox); li.appendChild(taskText);
            document.getElementById('task-list').appendChild(li);
            input.value = "";
        }

        // --- 5. SPOTIFY LOGIC (COMPACT FIX) ---
        function loadSpotify() {
            let input = document.getElementById('spotify-input').value;
            const iframe = document.getElementById('spotify-frame');
            
            // This clever logic takes a normal share link and converts it into a working embed link
            if (input.includes('spotify.com/')) {
                // Strip off any extra tracking code like "?si=12345"
                input = input.split('?')[0]; 
                // Convert normal link to embed link
                const embedUrl = input.replace('spotify.com/', 'spotify.com/embed/');
                
                iframe.src = embedUrl;
                iframe.style.display = "block";
            } else {
                alert("Please paste a normal Spotify link! (e.g. Right-click a playlist -> Share -> Copy Link)");
            }
        }
    </script>
</body>
</html>
