<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo-Fi Focus Space</title>
    <style>
        /* --- THE CORE VIBE --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url('https://images.unsplash.com/photo-1501339817388-d5937807ac02?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        .rain-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/Il9f7ZhytEiI0/giphy.gif') center/cover;
            opacity: 0.3;
            pointer-events: none;
            display: none;
            z-index: 1;
        }

        header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }

        .vibe-search input {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            backdrop-filter: blur(10px);
            outline: none;
            width: 250px;
        }
        .vibe-search input::placeholder { color: #ddd; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            margin-top: 50px;
            z-index: 2;
        }

        .widget {
            background: rgba(25, 25, 25, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h2 { margin-bottom: 15px; font-weight: 600; }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 10px 15px;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }
        button:hover { background: rgba(255, 255, 255, 0.4); }
        
        input[type="text"], input[type="number"] {
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
        }

        /* Pomodoro Timer Tweaks */
        #time-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
            letter-spacing: 2px;
        }
        .timer-settings {
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }
        .timer-settings input { width: 60px; padding: 5px; text-align: center; }

        /* To-Do Tweaks */
        ul { list-style: none; margin-top: 15px; text-align: left; }
        li {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.3s ease;
        }
        /* Make the checkbox look a bit nicer */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Radio Iframe */
        .radio-frame {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="rain-overlay" id="rain"></div>

    <header>
        <h1>🎧 Focus Space</h1>
        <div class="vibe-search">
            <input type="text" id="vibe-input" placeholder="Type 'rain' or 'neon'...">
        </div>
    </header>

    <div class="dashboard">
        
        <div class="widget">
            <h2>⏱️ Pomodoro</h2>
            <div class="timer-settings">
                <label>Focus: <input type="number" id="focus-mins" value="25" min="1"></label>
                <label>Break: <input type="number" id="break-mins" value="5" min="1"></label>
            </div>
            <div id="time-display">25:00</div>
            <button onclick="startTimer(true)">Focus</button>
            <button onclick="startTimer(false)">Break</button>
            <button onclick="pauseTimer()">Pause</button>
        </div>

        <div class="widget">
            <h2>📝 Tasks</h2>
            <input type="text" id="task-input" placeholder="What needs doing?" style="width: 70%;">
            <button onclick="addTask()">Add</button>
            <ul id="task-list"></ul>
        </div>

        <div class="widget">
            <h2>🎵 Lo-Fi Radio</h2>
            <p style="font-size: 0.8rem; margin-bottom: 10px;">24/7 Chill Beats to Study To</p>
            <iframe class="radio-frame" src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=0" title="LoFi Stream" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

    </div>

    <script>
        // --- 1. VIBE SEARCH LOGIC ---
        const vibeInput = document.getElementById('vibe-input');
        const body = document.body;
        const rainOverlay = document.getElementById('rain');

        vibeInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if (val.includes('rain')) {
                rainOverlay.style.display = 'block';
            } else if (val.includes('neon') || val.includes('cyberpunk')) {
                body.style.backgroundImage = "url('https://images.unsplash.com/photo-1555861496-faa3eafcb220?q=80&w=2073&auto=format&fit=crop')";
                rainOverlay.style.display = 'none';
            } else if (val.includes('clear')) {
                body.style.backgroundImage = "url('https://images.unsplash.com/photo-1501339817388-d5937807ac02?q=80&w=2070&auto=format&fit=crop')";
                rainOverlay.style.display = 'none';
            }
        });

        // --- 2. POMODORO LOGIC ---
        let timeLeft;
        let timerId = null;
        let isFocusMode = true;
        const timeDisplay = document.getElementById('time-display');
        const focusInput = document.getElementById('focus-mins');
        const breakInput = document.getElementById('break-mins');

        // Set initial display
        updateDisplay(focusInput.value * 60);

        function updateDisplay(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            timeDisplay.textContent = `${mins}:${secs}`;
        }

        function startTimer(isFocus) {
            if (timerId !== null) clearInterval(timerId); // Stop current timer if running
            
            // Set time based on which button they clicked
            let minutes = isFocus ? focusInput.value : breakInput.value;
            timeLeft = parseInt(minutes) * 60;
            updateDisplay(timeLeft);

            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay(timeLeft);
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    alert(isFocus ? "Focus time is up! Take a break." : "Break is over! Back to work.");
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerId);
            timerId = null;
        }

        // --- 3. TO-DO LIST LOGIC ---
        function addTask() {
            const input = document.getElementById('task-input');
            const text = input.value.trim();
            if (text === "") return;

            const li = document.createElement('li');
            
            // Create the checkbox
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            
            // Logic to delete the task when checked
            checkbox.onchange = function() {
                if(this.checked) {
                    li.style.opacity = '0'; // Cool fade out effect
                    setTimeout(() => li.remove(), 300); // Wait 0.3s then delete
                }
            };

            // Create the text span
            const taskText = document.createElement('span');
            taskText.textContent = text;

            // Put it all together
            li.appendChild(checkbox);
            li.appendChild(taskText);
            document.getElementById('task-list').appendChild(li);
            
            // Clear input box
            input.value = "";
        }
    </script>
</body>
</html>
